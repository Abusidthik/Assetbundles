# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-1949fac4-5bf7.cloud.databricks.com
    variables:
      catalog: assetbundle_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    presets:
     name_prefix: prod_${workspace.current_user.short_name}
     source_linked_deployment: false
    workspace:
      host: https://dbc-1949fac4-5bf7.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sidthikabu18@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sidthikabu18@gmail.com/prod/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: assetbundle_catalog
      schema: prod
    permissions:
      - user_name: sidthikabu18@gmail.com
        level: CAN_MANAGE
