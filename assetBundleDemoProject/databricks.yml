bundle:
  name: assetBundleDemoProject
  uuid: ca81a41e-bc80-4a26-8b93-6ebbd059d392

include:
  - resources/*.yml
  - resources/*/*.yml

# artifacts:
#   python_artifact:
#     type: whl
